name: Build Android APK

# Builds the Spetro Earn Android APK in the cloud and uploads it as a
# downloadable artifact. Run it manually from the GitHub "Actions" tab
# (Build Android APK → Run workflow), or it runs automatically on push to main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'client/**'
      - 'capacitor.config.json'
      - '.github/workflows/android-build.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spetro-earn-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
